<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MOTEUR // Bible de Diagnostic Nitro 3.5cc</title>
<style>
:root{
  --bg:#0A0C0E; --bg-elevated:#0F1215; --panel:#14171B; --panel-2:#1A1E23;
  --border:rgba(255,255,255,0.07); --border-strong:rgba(255,255,255,0.14);
  --text:#E7E9EC; --text-dim:#9AA1AA; --text-faint:#5C636C;
  --flame:#FF7A3D; --flame-dim:#7A3B22; --teal:#3DD9C4; --teal-dim:#1E5F57;
  --danger:#FF4757; --warn:#FFC93D; --ok:#4ADE80;
  --radius-sm:8px; --radius-md:14px; --radius-lg:20px;
  --font-display:-apple-system,"SF Pro Display",Avenir,"Segoe UI",system-ui,sans-serif;
  --font-body:-apple-system,"SF Pro Text","Segoe UI",system-ui,sans-serif;
  --font-mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box; margin:0; padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  background:
    radial-gradient(ellipse 900px 500px at 15% -10%, rgba(255,122,61,0.10), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 0%, rgba(61,217,196,0.06), transparent 55%),
    var(--bg);
  color:var(--text); font-family:var(--font-body); min-height:100vh; line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--flame); color:#0A0C0E;}
a{color:inherit;} button{font-family:inherit; cursor:pointer;}
:focus-visible{outline:2px solid var(--teal); outline-offset:2px; border-radius:4px;}
@media (prefers-reduced-motion: reduce){ *{animation-duration:.01ms !important; transition-duration:.01ms !important;} }

#app{display:flex; min-height:100vh;}
.sidebar{width:230px; flex-shrink:0; padding:22px 14px; border-right:1px solid var(--border);
  background:var(--bg-elevated); display:flex; flex-direction:column; gap:4px;
  position:sticky; top:0; height:100vh; overflow-y:auto;}
.brand{display:flex; align-items:center; gap:10px; padding:6px 10px 22px 10px;}
.brand-mark{width:34px; height:34px; border-radius:9px; background:linear-gradient(135deg, var(--flame), #B84A1E);
  display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-weight:700;
  font-size:14px; color:#0A0C0E; box-shadow:0 0 22px rgba(255,122,61,0.35); flex-shrink:0;}
.brand-text{display:flex; flex-direction:column; line-height:1.15;}
.brand-text b{font-size:13px; letter-spacing:0.06em;}
.brand-text span{font-size:10.5px; color:var(--text-faint); font-family:var(--font-mono); letter-spacing:0.04em;}
.nav-item{display:flex; align-items:center; gap:11px; padding:9px 11px; border-radius:var(--radius-sm);
  color:var(--text-dim); font-size:13.5px; font-weight:500; background:none; border:none; text-align:left;
  width:100%; transition:background .15s, color .15s;}
.nav-item:hover{background:var(--panel); color:var(--text);}
.nav-item.active{background:var(--panel-2); color:var(--text); box-shadow:inset 0 0 0 1px var(--border-strong);}
.nav-item .ico{width:16px; text-align:center; font-family:var(--font-mono); color:var(--flame); font-size:12px;}
.nav-sep{height:1px; background:var(--border); margin:12px 6px;}
.nav-label{font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.09em; padding:10px 11px 4px;}
.sidebar-foot{margin-top:auto; padding:10px; font-size:10.5px; color:var(--text-faint); font-family:var(--font-mono);}

.main{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{display:none; align-items:center; justify-content:space-between; padding:14px 16px;
  border-bottom:1px solid var(--border); background:var(--bg-elevated); position:sticky; top:0; z-index:20;}
.view{flex:1; padding:34px 42px 90px; max-width:1180px; width:100%; margin:0 auto;}
@media (max-width:920px){
  .sidebar{display:none;} .topbar{display:flex;} .view{padding:20px 16px 100px;} #app{flex-direction:column;}
}
.tabbar{display:none; position:fixed; bottom:0; left:0; right:0; z-index:30;
  background:rgba(15,18,21,0.92); backdrop-filter:blur(16px); border-top:1px solid var(--border);
  padding:6px 4px calc(6px + env(safe-area-inset-bottom)); justify-content:space-around;}
.tabbar button{background:none; border:none; color:var(--text-faint); display:flex; flex-direction:column;
  align-items:center; gap:3px; font-size:9.5px; padding:6px 4px; flex:1; font-family:var(--font-mono);}
.tabbar button.active{color:var(--flame);}
.tabbar .ico{font-size:16px;}
@media (max-width:920px){ .tabbar{display:flex;} }

h1.page-title{font-family:var(--font-display); font-size:26px; font-weight:700; letter-spacing:-0.01em;}
.eyebrow{font-family:var(--font-mono); font-size:11px; color:var(--flame); letter-spacing:.1em;
  text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:8px;}
.eyebrow::before{content:''; width:16px; height:1px; background:var(--flame);}
.page-sub{color:var(--text-dim); font-size:14.5px; margin-top:8px; max-width:640px;}
.section-head{display:flex; align-items:baseline; justify-content:space-between; margin:38px 0 16px;}
.section-head h2{font-family:var(--font-display); font-size:17px; font-weight:600;}
.section-head .count{font-family:var(--font-mono); font-size:11.5px; color:var(--text-faint);}

.card{background:linear-gradient(180deg, var(--panel), var(--panel-2) 140%); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:22px; position:relative; overflow:hidden;}
.card:hover{border-color:var(--border-strong);}
.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:11px 18px;
  border-radius:10px; font-size:13.5px; font-weight:600; border:1px solid var(--border-strong);
  background:var(--panel-2); color:var(--text); transition:transform .12s, background .15s, border-color .15s;}
.btn:hover{background:#20242A; transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn-primary{background:linear-gradient(135deg, var(--flame), #C6501E); border-color:transparent; color:#0A0C0E;}
.btn-primary:hover{filter:brightness(1.08);}
.btn-ghost{background:transparent; border-color:var(--border);}
.btn-sm{padding:7px 12px; font-size:12px; border-radius:8px;}
.btn-block{width:100%;}
.pill{display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; font-size:11px;
  font-family:var(--font-mono); border:1px solid var(--border-strong); color:var(--text-dim);}
.pill.flame{color:var(--flame); border-color:var(--flame-dim); background:rgba(255,122,61,0.08);}
.pill.teal{color:var(--teal); border-color:var(--teal-dim); background:rgba(61,217,196,0.08);}
.pill.danger{color:var(--danger); border-color:rgba(255,71,87,0.4); background:rgba(255,71,87,0.08);}
.pill.warn{color:var(--warn); border-color:rgba(255,201,61,0.4); background:rgba(255,201,61,0.08);}
.badge-risk{font-family:var(--font-mono); font-size:10px; padding:3px 8px; border-radius:6px; letter-spacing:.03em;}
.risk-1{background:rgba(74,222,128,.12); color:var(--ok);}
.risk-2{background:rgba(255,201,61,.12); color:var(--warn);}
.risk-3{background:rgba(255,71,87,.12); color:var(--danger);}

input[type=text], input[type=number], select, textarea{width:100%; background:var(--bg-elevated);
  border:1px solid var(--border-strong); color:var(--text); padding:11px 13px; border-radius:10px;
  font-size:13.5px; font-family:inherit;}
textarea{resize:vertical; min-height:70px;}
label.field-label{font-size:11.5px; color:var(--text-dim); font-family:var(--font-mono); margin-bottom:6px;
  display:block; letter-spacing:.02em;}
.field{margin-bottom:16px;}
.grid-2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.grid-3{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
@media (max-width:700px){ .grid-2, .grid-3{grid-template-columns:1fr;} }

::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#2A2F36; border-radius:6px;}
.kbd{font-family:var(--font-mono); font-size:10.5px; background:var(--panel-2); border:1px solid var(--border-strong);
  border-radius:5px; padding:1px 6px;}
.view-enter{animation:fadeUp .32s ease both;}
@keyframes fadeUp{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

.hero{position:relative; padding:46px 0 10px;}
.hero-flame-canvas{position:absolute; top:-60px; right:-60px; width:320px; height:320px; opacity:.5; pointer-events:none;}
.hero h1{font-family:var(--font-display); font-size:clamp(28px,4vw,42px); font-weight:700; letter-spacing:-0.02em; max-width:680px;}
.hero .accent{color:var(--flame);}
.hero p.lede{margin-top:14px; color:var(--text-dim); font-size:15px; max-width:520px;}
.hero-stats{display:flex; gap:28px; margin-top:28px; flex-wrap:wrap;}
.hero-stat b{font-family:var(--font-mono); font-size:22px; color:var(--teal); display:block;}
.hero-stat span{font-size:11px; color:var(--text-faint); font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.05em;}

.mode-grid{display:grid; grid-template-columns:1.3fr 1fr; gap:18px; margin-top:36px;}
@media (max-width:800px){ .mode-grid{grid-template-columns:1fr;} }
.mode-card{cursor:pointer; transition:border-color .18s, transform .18s;}
.mode-card:hover{transform:translateY(-3px); border-color:var(--flame-dim);}
.mode-card .mk-ico{font-family:var(--font-mono); font-size:11px; color:var(--flame); letter-spacing:.08em;}
.mode-card h3{font-family:var(--font-display); font-size:20px; margin:10px 0 8px;}
.mode-card p{color:var(--text-dim); font-size:13.5px; max-width:420px;}
.mode-card .arrow{position:absolute; right:22px; bottom:22px; font-family:var(--font-mono); color:var(--text-faint);
  font-size:20px; transition:transform .18s, color .18s;}
.mode-card:hover .arrow{transform:translateX(4px); color:var(--flame);}
.home-quick{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-top:14px;}
@media (max-width:800px){ .home-quick{grid-template-columns:1fr 1fr;} }
.quick-tile{padding:16px; text-align:left;}
.quick-tile .qt-ico{color:var(--teal); font-family:var(--font-mono); font-size:16px;}
.quick-tile h4{font-size:13px; margin-top:8px; font-weight:600;}
.quick-tile p{font-size:11.5px; color:var(--text-faint); margin-top:3px;}

.diag-wrap{display:grid; grid-template-columns:1fr 320px; gap:22px;}
@media (max-width:920px){ .diag-wrap{grid-template-columns:1fr;} }
.breadcrumb{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:18px;}
.crumb{font-family:var(--font-mono); font-size:10.5px; padding:4px 9px; border-radius:6px; background:var(--panel-2);
  border:1px solid var(--border); color:var(--text-dim); display:flex; align-items:center; gap:6px;}
.crumb b{color:var(--teal);}
.question-card{padding:30px;}
.q-progress{height:3px; background:var(--panel-2); border-radius:2px; overflow:hidden; margin-bottom:22px;}
.q-progress-fill{height:100%; background:linear-gradient(90deg, var(--flame), var(--teal)); transition:width .4s ease;}
.q-cat{font-family:var(--font-mono); font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.08em;}
.q-text{font-family:var(--font-display); font-size:22px; font-weight:600; margin:10px 0 24px; line-height:1.35;}
.answer-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
@media (max-width:520px){ .answer-grid{grid-template-columns:1fr;} }
.answer-btn{padding:14px 16px; border-radius:12px; border:1px solid var(--border-strong); background:var(--bg-elevated);
  text-align:left; font-size:13.5px; font-weight:500; color:var(--text); transition:border-color .15s, background .15s, transform .1s;}
.answer-btn:hover{border-color:var(--teal); background:var(--panel-2); transform:translateY(-1px);}
.answer-btn .a-sub{display:block; font-size:10.5px; color:var(--text-faint); font-family:var(--font-mono); margin-top:3px;}
.q-actions{display:flex; justify-content:space-between; margin-top:24px; gap:10px;}
.rank-panel{position:sticky; top:20px; align-self:start;}
.rank-title{font-family:var(--font-mono); font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.08em; margin-bottom:14px;}
.rank-item{padding:12px 0; border-top:1px solid var(--border);}
.rank-item:first-child{border-top:none;}
.rank-row{display:flex; justify-content:space-between; align-items:center; gap:8px;}
.rank-name{font-size:12.5px; font-weight:600;}
.rank-pct{font-family:var(--font-mono); font-size:13px; color:var(--teal); font-weight:700;}
.rank-bar{height:5px; background:var(--panel-2); border-radius:3px; margin-top:7px; overflow:hidden;}
.rank-bar-fill{height:100%; background:linear-gradient(90deg, var(--flame), var(--teal)); border-radius:3px; transition:width .5s ease;}
.empty-rank{font-size:12px; color:var(--text-faint); font-style:italic;}

.result-card{padding:22px; margin-bottom:14px; cursor:pointer; transition:border-color .15s;}
.result-card:hover{border-color:var(--flame-dim);}
.result-top{display:flex; justify-content:space-between; align-items:flex-start; gap:14px;}
.result-name{font-family:var(--font-display); font-size:18px; font-weight:700;}
.result-cat{font-size:11.5px; color:var(--text-faint); font-family:var(--font-mono); margin-top:3px;}
.result-pct{font-family:var(--font-mono); font-size:26px; font-weight:800; color:var(--teal); white-space:nowrap;}
.result-pct.hi{color:var(--flame);}
.result-bar{height:6px; background:var(--panel-2); border-radius:3px; margin:14px 0; overflow:hidden;}
.result-bar-fill{height:100%; border-radius:3px; background:linear-gradient(90deg, var(--flame), var(--teal));}
.result-desc{font-size:13px; color:var(--text-dim); line-height:1.6;}
.result-meta{display:flex; gap:8px; margin-top:14px; flex-wrap:wrap;}

.fiche-head{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap;}
.fiche-svg-box{width:100%; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-md);
  padding:16px; margin:20px 0; display:flex; align-items:center; justify-content:center;}
.fiche-grid{display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:10px;}
@media (max-width:800px){ .fiche-grid{grid-template-columns:1fr;} }
.fiche-block h4{font-family:var(--font-mono); font-size:11px; color:var(--flame); text-transform:uppercase; letter-spacing:.07em; margin-bottom:8px;}
.fiche-block p, .fiche-block li{font-size:13.5px; color:var(--text-dim); line-height:1.7;}
.fiche-block ul{padding-left:18px; margin-top:4px;}
.fiche-stats{display:flex; gap:10px; flex-wrap:wrap; margin-top:16px;}
.stat-box{background:var(--bg-elevated); border:1px solid var(--border); border-radius:10px; padding:10px 14px; min-width:100px;}
.stat-box b{display:block; font-family:var(--font-mono); font-size:15px;}
.stat-box span{font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.05em;}

.search-box{position:relative;}
.search-box input{padding-left:40px; font-size:15px; padding-top:14px; padding-bottom:14px;}
.search-ico{position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-faint); font-family:var(--font-mono);}
.search-results{margin-top:18px; display:flex; flex-direction:column; gap:10px;}
.sr-item{padding:16px 18px; display:flex; justify-content:space-between; align-items:center; cursor:pointer;}
.sr-item:hover{border-color:var(--teal-dim);}
.sr-name{font-weight:600; font-size:14px;}
.sr-cat{font-size:11px; color:var(--text-faint); font-family:var(--font-mono); margin-top:3px;}
mark{background:rgba(255,122,61,.28); color:var(--flame); border-radius:3px; padding:0 2px;}

table{width:100%; border-collapse:collapse; font-size:13px;}
th,td{padding:10px 12px; text-align:left; border-bottom:1px solid var(--border);}
th{font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-faint); font-weight:500;}
tbody tr:hover{background:var(--panel-2);}
.table-wrap{overflow-x:auto; border:1px solid var(--border); border-radius:var(--radius-md);}
.table-wrap table{min-width:520px;}

.tabs{display:flex; gap:6px; border-bottom:1px solid var(--border); margin-bottom:22px; flex-wrap:wrap;}
.tab-btn{padding:10px 4px; margin-right:14px; background:none; border:none; color:var(--text-faint); font-size:13px;
  font-weight:600; border-bottom:2px solid transparent;}
.tab-btn.active{color:var(--text); border-color:var(--flame);}

#toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--panel-2);
  border:1px solid var(--border-strong); padding:11px 18px; border-radius:10px; font-size:13px; opacity:0;
  pointer-events:none; transition:all .25s; z-index:100; box-shadow:0 10px 30px rgba(0,0,0,.4);}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

.gloss-item{padding:14px 0; border-top:1px solid var(--border);}
.gloss-item:first-child{border-top:none;}
.gloss-term{font-weight:700; font-size:13.5px; color:var(--teal);}
.hist-item{padding:14px 16px; display:flex; justify-content:space-between; align-items:center; gap:10px;}
.hist-item + .hist-item{margin-top:8px;}

@media print{
  body{background:#fff !important; color:#000 !important;}
  .sidebar, .tabbar, .topbar, .btn, .q-actions, #toast{display:none !important;}
  .view{max-width:100%; padding:0;}
  .card{border:1px solid #999; background:#fff !important; box-shadow:none;}
  * {color:#000 !important; border-color:#ccc !important;}
}
.svg-diagram{width:100%; height:auto; max-width:520px;}
.empty-state{text-align:center; padding:60px 20px; color:var(--text-faint);}
.empty-state .ico{font-size:32px; margin-bottom:10px; font-family:var(--font-mono); color:var(--flame-dim);}

/* Guide de réglage — accordéon de scénarios */
.guide-axis-tabs{display:flex; gap:8px; flex-wrap:wrap; margin:20px 0 26px;}
.axis-tab{padding:10px 16px; border-radius:10px; border:1px solid var(--border-strong); background:var(--panel-2);
  color:var(--text-dim); font-size:12.5px; font-weight:600; display:flex; align-items:center; gap:8px; transition:all .15s;}
.axis-tab .axis-n{font-family:var(--font-mono); font-size:10px; color:var(--text-faint); background:var(--bg-elevated);
  border-radius:5px; padding:1px 6px;}
.axis-tab:hover{border-color:var(--teal-dim);}
.axis-tab.active{background:linear-gradient(135deg, var(--flame), #C6501E); color:#0A0C0E; border-color:transparent;}
.axis-tab.active .axis-n{background:rgba(10,12,14,0.25); color:#0A0C0E;}
.axis-intro{font-size:13.5px; color:var(--text-dim); line-height:1.7; max-width:760px; margin-bottom:24px;}
.guide-scenario{padding:0; margin-bottom:12px; cursor:pointer;}
.guide-q-row{display:flex; align-items:center; justify-content:space-between; gap:14px; padding:18px 22px;}
.guide-q-left{display:flex; align-items:flex-start; gap:12px;}
.guide-q-num{font-family:var(--font-mono); font-size:11px; color:var(--flame); flex-shrink:0; padding-top:2px;}
.guide-q-text{font-family:var(--font-display); font-size:14.5px; font-weight:600; line-height:1.4;}
.guide-chevron{color:var(--text-faint); font-family:var(--font-mono); flex-shrink:0; transition:transform .2s ease;}
.guide-scenario.open .guide-chevron{transform:rotate(90deg); color:var(--flame);}
.guide-body{max-height:0; overflow:hidden; transition:max-height .35s ease;}
.guide-scenario.open .guide-body{max-height:2400px;}
.guide-body-inner{padding:0 22px 22px;}
.guide-signals{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;}
.signal-chip{font-family:var(--font-mono); font-size:10.5px; padding:5px 10px; border-radius:7px; background:var(--bg-elevated);
  border:1px solid var(--border); color:var(--text-dim); display:flex; gap:6px; align-items:center;}
.signal-chip .signal-k{color:var(--text-faint);}
.signal-chip.snd{border-color:var(--teal-dim);} .signal-chip.snd .signal-k{color:var(--teal);}
.signal-chip.smk{border-color:rgba(154,161,170,.3);}
.signal-chip.stb{border-color:var(--flame-dim);} .signal-chip.stb .signal-k{color:var(--flame);}
.guide-sub{margin-top:14px;}
.guide-sub h5{font-family:var(--font-mono); font-size:10.5px; color:var(--flame); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px;}
.guide-sub p{font-size:13px; color:var(--text-dim); line-height:1.7;}
.guide-tip{margin-top:14px; padding:12px 14px; background:rgba(61,217,196,0.06); border:1px solid var(--teal-dim); border-radius:10px;}
.guide-tip b{color:var(--teal); font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; display:block; margin-bottom:5px;}

.guide-danger b{color:var(--danger); font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; display:block; margin-bottom:5px;}
.guide-danger p{font-size:13px; color:var(--text-dim); line-height:1.6;}
.guide-method{padding:20px 22px; margin-bottom:22px;}
.guide-method ol{padding-left:20px; margin-top:8px;}
.guide-method li{font-size:13px; color:var(--text-dim); line-height:1.8;}

/* ============ ANALYSE SONORE ============ */
.sound-warning{padding:14px 18px; border-radius:12px; background:rgba(255,201,61,0.08); border:1px solid rgba(255,201,61,0.35); margin:18px 0;}
.sound-warning b{color:var(--warn); font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.05em; display:block; margin-bottom:6px;}
.sound-warning p{font-size:13px; color:var(--text-dim); line-height:1.6;}
.sound-error{padding:14px 18px; border-radius:12px; background:rgba(255,71,87,0.08); border:1px solid rgba(255,71,87,0.35); margin:18px 0;}
.sound-error b{color:var(--danger); font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.05em; display:block; margin-bottom:6px;}
.sound-error p{font-size:13px; color:var(--text-dim); line-height:1.6;}

.rec-start-zone{text-align:center; padding:50px 20px;}
.rec-btn{width:120px; height:120px; border-radius:50%; border:none; cursor:pointer;
  background:radial-gradient(circle at 35% 30%, #FF9A63, var(--flame) 60%, #B84A1E);
  box-shadow:0 0 0 8px rgba(255,122,61,0.08), 0 10px 40px rgba(255,122,61,0.25);
  display:flex; align-items:center; justify-content:center; margin:0 auto;
  font-family:var(--font-mono); color:#0A0C0E; font-weight:800; font-size:13px; letter-spacing:.05em;
  transition:transform .15s;}
.rec-btn:hover{transform:scale(1.04);}
.rec-btn:active{transform:scale(0.97);}
.rec-hint{margin-top:20px; font-size:12.5px; color:var(--text-faint); max-width:420px; margin-left:auto; margin-right:auto;}

.protocol-list{display:flex; flex-direction:column; gap:6px; margin:20px 0; max-width:480px; margin-left:auto; margin-right:auto; text-align:left;}
.protocol-list-item{display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px; background:var(--bg-elevated); border:1px solid var(--border);}
.protocol-list-item .pn{font-family:var(--font-mono); font-size:10px; color:var(--text-faint); width:16px;}
.protocol-list-item .pl{font-size:12.5px; color:var(--text-dim);}

.live-wrap{display:flex; flex-direction:column; align-items:center; padding:10px 0 30px;}
.phase-type-hold .phase-banner{border-color:var(--teal-dim); background:linear-gradient(180deg, rgba(61,217,196,0.08), transparent);}
.phase-type-action .phase-banner{border-color:var(--flame-dim); background:linear-gradient(180deg, rgba(255,122,61,0.10), transparent);}
.phase-type-info .phase-banner{border-color:var(--border-strong);}
.phase-banner{width:100%; max-width:640px; border:1px solid var(--border); border-radius:var(--radius-lg); padding:26px 26px 22px; text-align:center;}
.phase-label{font-family:var(--font-mono); font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.08em;}
.phase-instruction{font-family:var(--font-display); font-size:clamp(20px,4.5vw,30px); font-weight:800; margin:12px 0; line-height:1.25; letter-spacing:-0.01em;}
.phase-type-action .phase-instruction{color:var(--flame);}
.phase-type-hold .phase-instruction{color:var(--teal);}
.phase-countdown{font-family:var(--font-mono); font-size:42px; font-weight:800; color:var(--text); margin-top:4px;}
.phase-progress-dots{display:flex; gap:6px; justify-content:center; margin:18px 0 6px;}
.phase-dot{width:7px; height:7px; border-radius:50%; background:var(--panel-2); border:1px solid var(--border-strong);}
.phase-dot.done{background:var(--teal); border-color:var(--teal);}
.phase-dot.current{background:var(--flame); border-color:var(--flame); box-shadow:0 0 10px rgba(255,122,61,0.6);}

.live-readout{display:flex; gap:26px; justify-content:center; margin-top:22px; flex-wrap:wrap;}
.readout-box{text-align:center;}
.readout-box b{display:block; font-family:var(--font-mono); font-size:30px; color:var(--teal);}
.readout-box span{font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.06em; font-family:var(--font-mono);}
.live-canvas-wrap{width:100%; max-width:640px; margin-top:22px; border:1px solid var(--border); border-radius:var(--radius-md); background:var(--bg-elevated); padding:12px;}
#soundCanvas{width:100%; height:120px; display:block;}
.rec-stop-btn{margin-top:26px;}

.report-verdict{display:flex; align-items:center; gap:14px; padding:18px 20px; border-radius:var(--radius-md); margin-bottom:8px;}
.report-verdict.ok{background:rgba(74,222,128,0.08); border:1px solid rgba(74,222,128,0.3);}
.report-verdict.warn{background:rgba(255,201,61,0.08); border:1px solid rgba(255,201,61,0.35);}
.report-verdict.danger{background:rgba(255,71,87,0.08); border:1px solid rgba(255,71,87,0.35);}
.report-verdict-ico{font-family:var(--font-mono); font-size:20px; flex-shrink:0;}
.report-verdict.ok .report-verdict-ico{color:var(--ok);}
.report-verdict.warn .report-verdict-ico{color:var(--warn);}
.report-verdict.danger .report-verdict-ico{color:var(--danger);}
.report-verdict-title{font-weight:700; font-size:14px;}
.report-verdict-detail{font-size:12.5px; color:var(--text-dim); margin-top:3px; line-height:1.5;}
.report-metrics{display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:10px; margin:16px 0;}

.report-metric span{font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.04em;}

 confirm:"Visser légèrement la butée de ralenti dans le sens qui ouvre davantage le papillon et vérifier que le moteur résiste mieux aux sollicitations (virage, réception).",

 prevention:"Revérifier le ralenti après chaque intervention sur le carburateur, même mineure."},

{id:"c07",name:"Bougie trop froide pour les conditions ou le carburant",cat:"Allumage",thermal:"froid",risk:2,diff:1,time:"2 min",svg:"bougie",

 tips:"Une bougie neuve légèrement dorée après un run est un bon indicateur d'indice thermique bien choisi.",

{id:"c09",name:"Filament de bougie usé ou grillé",cat:"Allumage",thermal:null,risk:1,diff:1,time:"2 min",svg:"bougie",

 symptoms:[["s23",5],["s44",4],["s35",3],["s25",3],["s45",3],["s39",2]],
 desc:"Le mélange s'enflamme prématurément avant le point d'allumage optimal du cycle, provoqué par un point chaud dans la chambre de combustion (calamine, bougie inadaptée) plutôt qu'un vrai défaut de carburation.",
 why:"Un dépôt de calamine incandescent ou une bougie trop chaude peut amorcer la combustion avant la fin de la course de compression, créant une opposition de forces qui génère bruit, vibrations et surchauffe locale intense.",
 confirm:"Le bruit de détonation irrégulière persiste même après un réglage de richesse haut-régime confirmé correct par la température.",
 exclude:"Si le cliquetis disparaît en enrichissant simplement la vis H, il s'agissait d'une détonation liée à un mélange pauvre classique et non d'un vrai pré-allumage.",
 repair:"Déposer la culasse et le piston pour nettoyer tout dépôt de calamine, remplacer la bougie par un indice thermique plus froid, vérifier la qualité et le taux de nitrométhane du carburant.",
 setting:"Sur piste rapide et chaude, privilégier systématiquement un indice de bougie plus froid dès la préparation initiale de la session.",
 errors:"Confondre pré-allumage et détonation par mélange pauvre : les deux sonnent similairement mais les corrections diffèrent radicalement (calamine/bougie vs vis H).",
 tips:"Le pré-allumage donne un bruit plus métallique et sec, presque comme un petit 'ping', tandis que la détonation par manque de richesse donne un bruit plus sourd et irrégulier.",
 prevention:"Nettoyer la chambre de combustion et la calotte de piston tous les 8 à 10 pleins en usage compétitif intensif."},

{id:"c21",name:"Détonation par mélange trop pauvre en charge",cat:"Thermique",thermal:"chaud",risk:3,diff:1,time:"5 min",svg:"thermo",
 symptoms:[["s23",4],["s24",4],["s35",3],["s21",3],["s29",3],["s41",2]],
 desc:"Sous forte charge, le mélange insuffisamment riche brûle de façon incomplète et irrégulière, générant de petites détonations perceptibles distinctes d'un pré-allumage mécanique.",
 why:"Un mélange pauvre en charge maximale ne dispose pas d'assez de carburant liquide pour assurer une combustion progressive et complète ; le front de flamme devient irrégulier et produit ces petites explosions successives.",
 confirm:"Ouvrir la vis H de 1/8 de tour fait disparaître nettement le phénomène en 1 à 2 runs de test.",
 exclude:"Si l'enrichissement du mélange ne change rien à la détonation perçue, réorienter le diagnostic vers un pré-allumage par point chaud (calamine, bougie).",
 repair:"Rouvrir la vis H progressivement jusqu'à disparition complète du bruit de détonation, en validant simultanément la baisse de température associée.",
 setting:"Toujours garder une marge de sécurité de richesse en compétition d'endurance plutôt que de rechercher le point de puissance pure en essai chronométré court.",
 errors:"Ignorer ce signal sonore d'alerte précoce, qui précède souvent de peu un grippage complet si le réglage pauvre persiste sur plusieurs runs.",
 tips:"Ce bruit ressemble à un crépitement plus qu'à un claquement isolé, contrairement au pré-allumage plus ponctuel.",
 prevention:"Toujours revalider le réglage H après chaque changement de bougie, de carburant ou de conditions météo importantes."},

{id:"c22",name:"Vapor lock (vaporisation du carburant dans la durite)",cat:"Alimentation",thermal:"chaud",risk:2,diff:1,time:"10 min",svg:"fuite",
 symptoms:[["s16",5],["s30",4],["s31",3],["s24",3],["s01",2],["s09",1],["s64",3]],
 desc:"Le carburant se vaporise partiellement dans la durite d'alimentation sous l'effet de la chaleur ambiante du compartiment moteur, créant des bulles d'air qui interrompent momentanément l'arrivée de carburant liquide.",
 why:"Le méthanol a un point d'ébullition relativement bas. Une durite cheminant trop près du pot d'échappement ou de la culasse peut suffire à vaporiser localement le carburant, créant un manque d'alimentation intermittent qui se traduit par un calage après un temps de fonctionnement prolongé.",
 confirm:"Le calage survient de façon répétée après plusieurs minutes de roulage continu, particulièrement par temps chaud, et le moteur redémarre normalement une fois refroidi quelques minutes.",
 exclude:"Un calage systématique dès le démarrage ou indépendant de la durée de roulage oriente vers une autre cause (carburation, pression réservoir).",
 repair:"Réacheminer la durite de carburant à distance des sources de chaleur (échappement, culasse), envisager une durite silicone gainée thermiquement.",
 setting:"Vérifier le cheminement complet de la durite à chaque montage de carrosserie, un simple collier de maintien mal positionné peut suffire à créer un point chaud.",
 errors:"Attribuer ce symptôme à un problème de carburation alors que le réglage moteur est en réalité correct.",
 tips:"Le vapor lock touche particulièrement les moteurs montés en configuration compacte avec peu d'espace de ventilation autour de la durite.",
 prevention:"Utiliser des colliers de maintien de durite non métalliques qui ne conduisent pas la chaleur vers le tube carburant."},

{id:"c23",name:"Pression d'alimentation réservoir insuffisante",cat:"Alimentation",thermal:null,risk:1,diff:1,time:"10 min",svg:"fuite",
 symptoms:[["s20",4],["s41",3],["s30",3],["s89",4],["s49",2],["s01",2]],
 desc:"La durite de mise en pression du réservoir (prise sur l'échappement) est débranchée, percée ou mal positionnée, réduisant l'alimentation en carburant à mesure que le niveau baisse.",
 why:"Le réservoir d'un moteur nitro n'est pas gravitaire seul : la pression prélevée sur l'échappement pousse le carburant vers le carburateur. Sans cette pression, le débit devient insuffisant, en particulier lorsque le réservoir se vide et que la colonne de carburant restante diminue.",
 confirm:"Vérifier visuellement le branchement de la durite de pression sur le raccord d'échappement et sur le bouchon du réservoir ; tester avec le pouce en bouchant la sortie d'échappement à l'arrêt pour sentir une résistance d'air qui confirme un circuit étanche.",
 exclude:"Un circuit de pression visuellement intact et étanche au test manuel oriente le diagnostic vers un autre problème d'alimentation (durite fissurée, pointeau).",
 repair:"Reconnecter fermement la durite sur les deux raccords, remplacer toute durite fissurée ou décolorée par de l'usure du méthanol.",
 setting:"Vérifier ce point en priorité absolue avant tout réglage carburateur en cas de perte de puissance progressive en cours de run.",
 errors:"Négliger ce point simple et se lancer directement dans un réglage complexe de carburation alors que la cause est un simple débranchement.",
 tips:"Un moteur qui perd en puissance progressivement à mesure que le réservoir se vide, puis retrouve de la vigueur après un plein, pointe fortement vers ce défaut.",
 prevention:"Contrôler systématiquement les raccords de durite de pression à chaque montage de carrosserie et remplacer les durites tous les 15-20 pleins."},

{id:"c24",name:"Pression d'alimentation réservoir excessive",cat:"Alimentation",thermal:null,risk:1,diff:1,time:"10 min",svg:"fuite",
 symptoms:[["s43",4],["s05",3],["s40",3],["s21",2],["s78",2]],
 desc:"Une pression excessive au réservoir, souvent due à un montage de durite de contre-pression sur un raccord de sortie sous-dimensionné ou un montage inversé, noie le moteur en charge.",

 exclude:"Si retirer la durite de pression aggrave le problème ou provoque un manque de puissance, ce n'est pas un excès de pression mais plutôt un manque.",
 repair:"Vérifier le diamètre et le raccordement correct de la durite de pression, s'assurer qu'aucun clapet de contre-pression n'est monté à l'envers.",
 setting:"Respecter scrupuleusement le schéma de montage préconisé par le fabricant du réservoir et de l'échappement, sans improviser un raccord de diamètre différent.",

 tips:"Un excès de pression réservoir donne souvent un ralenti correct mais une accélération anormalement riche et 'baveuse'.",
 prevention:"Utiliser exclusivement les raccords et diamètres de durite préconisés par le fabricant, sans mélanger des références de marques différentes."},

{id:"c25",name:"Filtre à air colmaté",cat:"Alimentation",thermal:null,risk:1,diff:1,time:"5 min",svg:"fuite",

 tips:"Le filtre doit être vérifié après chaque session sur terrain poussiéreux, et systématiquement en fin de journée de compétition.",
 prevention:"Disposer toujours d'un filtre de rechange propre et pré-huilé dans la caisse à outils pour un remplacement rapide entre les manches."}
);
CAUSES.push(

 prevention:"Toujours revalider le réglage en essais libres dès que les conditions météo changent notablement en cours de journée de compétition."},

{id:"c35",name:"Pointeau ou siège de pointeau du carburateur usé",cat:"Alimentation",thermal:null,risk:2,diff:2,time:"20 min",svg:"carb",

 confirm:"Le comportement moteur varie de façon erratique d'un run à l'autre malgré un réglage strictement identique des vis, sans lien avec la météo ou le carburant.",

 tips:"Un débit irrégulier au goutte-à-goutte visible en actionnant manuellement la pompe d'amorçage, carburateur déposé, confirme souvent visuellement l'usure du pointeau.",

{id:"c36",name:"Durite de carburant fissurée ou perméable",cat:"Alimentation",thermal:null,risk:1,diff:1,time:"10 min",svg:"fuite",

 confirm:"Inspecter la durite : une teinte trouble, une rigidité excessive ou une texture collante indique une dégradation avancée à remplacer préventivement.",

 tips:"Remplacer systématiquement toutes les durites carburant en début de saison, indépendamment de leur état apparent.",

{id:"c37",name:"Pot résonant ou échappement mal accordé",cat:"Échappement",thermal:null,risk:1,diff:2,time:"variable",svg:"echappement",
 symptoms:[["s88",4],["s92",4],["s26",3],["s46",3],["s20",2]],

 confirm:"Le changement d'échappement récent coïncide avec l'apparition d'un manque de puissance localisé en haut de régime ou en sortie de virage, sans qu'aucun réglage carburateur n'explique la perte.",
 exclude:"Un échappement d'origine ou déjà validé sur ce moteur sans modification récente élimine cette cause.",
 repair:"Revenir à la référence d'échappement précédemment validée, ou consulter le tableau de compatibilité moteur-pot du fabricant pour ajuster la longueur de raccordement.",

 tips:"Une perte de puissance qui se manifeste uniquement en très haut régime, avec un bas et moyen régime inchangés, pointe fortement vers un défaut d'accord de l'échappement.",
 prevention:"Documenter précisément chaque configuration d'échappement testée avec son réglage carburateur associé pour faciliter les comparaisons futures."},

{id:"c38",name:"Durite de contre-pression débranchée ou percée",cat:"Échappement",thermal:null,risk:1,diff:1,time:"5 min",svg:"echappement",

 desc:"La durite qui prélève la pression d'échappement pour alimenter le réservoir en surpression est débranchée, percée ou obstruée, réduisant l'alimentation en carburant.",

 confirm:"Inspecter visuellement le raccord sur le collecteur d'échappement et sur le bouchon de réservoir, vérifier l'absence de perçage sur toute la longueur de la durite.",
 exclude:"Un circuit visuellement intact et correctement raccordé exclut cette cause précise, à ne pas confondre avec le circuit d'alimentation carburant lui-même.",

 tips:"Un moteur qui perd en puissance uniquement en fin de réservoir, avec une bonne puissance réservoir plein, pointe vers ce circuit de pression spécifique.",
 prevention:"Utiliser un raccord de durite avec verrouillage positif plutôt qu'un simple emmanchement qui se débranche facilement aux vibrations."},

{id:"c39",name:"Patinage d'embrayage (masselottes usées ou ressort faible)",cat:"Transmission",thermal:null,risk:1,diff:2,time:"20 min",svg:"transmission",
 symptoms:[["s84",5],["s20",3],["s91",3],["s25",2],["s52",2]],
 desc:"L'embrayage centrifuge patine avant d'assurer une transmission complète du couple moteur, en particulier en charge ou en côte, donnant une impression de manque de puissance moteur alors que le moteur lui-même fonctionne normalement.",
 why:"Les masselottes d'embrayage usées perdent de leur matière de friction, et un ressort de rappel fatigué modifie le point d'engagement, provoquant un glissement prolongé qui dissipe l'énergie en chaleur plutôt qu'en propulsion.",
 confirm:"Le régime moteur monte normalement au son mais la vitesse du véhicule ne suit pas proportionnellement, particulièrement sensible en côte ou en accélération lourde.",
 exclude:"Une accélération du véhicule parfaitement corrélée à la montée en régime sonore du moteur exclut le patinage d'embrayage.",
 repair:"Remplacer les masselottes d'embrayage et vérifier l'état de la cloche d'embrayage, souvent rayée par le patinage prolongé et à reponcer ou remplacer également.",
 setting:"Choisir un jeu de ressorts d'embrayage adapté au couple du moteur 3.5cc et au style de pilotage (point d'engagement plus haut pour un pilotage agressif).",
 errors:"Diagnostiquer à tort un manque de puissance moteur et modifier la carburation alors que le problème réside dans la transmission.",
 tips:"Une odeur de friction chaude caractéristique après un run est un signe quasi certain de patinage d'embrayage.",
 prevention:"Remplacer les masselottes d'embrayage de façon préventive toutes les 15 à 20 sessions de compétition intensive."},

{id:"c40",name:"Volant moteur (flywheel) inadapté ou desserré",cat:"Transmission",thermal:null,risk:2,diff:2,time:"15 min",svg:"transmission",

 confirm:"Vérifier le serrage de l'écrou de volant moteur au couple préconisé ; un jeu perceptible en tournant le volant à la main moteur à l'arrêt confirme un défaut de serrage.",
 exclude:"Un volant moteur correctement serré et de référence standard exclut cette cause au profit d'un autre point de la chaîne cinématique.",
 repair:"Resserrer l'écrou de volant au couple préconisé avec du frein filet, ou changer de référence de volant pour retrouver le poids d'origine constructeur.",
 setting:"Un volant plus lourd stabilise le ralenti et améliore la motricité en sortie de virage lente, un volant plus léger favorise la réactivité en montée en régime sur piste rapide.",
 errors:"Changer de volant moteur pour une référence de poids très différente sans revalider l'ensemble du réglage carburateur, particulièrement sensible au ralenti.",
 tips:"Un volant desserré donne un bruit métallique intermittent qui varie avec le régime moteur, contrairement au bruit constant d'un roulement usé.",
 prevention:"Revérifier le couple de serrage du volant moteur après chaque démontage d'embrayage, opération qui nécessite souvent sa dépose."},

{id:"c41",name:"Batterie de chauffe-bougie ou de banc de démarrage faible",cat:"Démarrage",thermal:"froid",risk:1,diff:1,time:"2 min",svg:"bougie",
 symptoms:[["s01",3],["s02",3],["s07",4],["s65",2]],

 why:"Un filament de bougie insuffisamment chauffé retarde l'amorçage de la catalyse, tandis qu'un banc de démarrage sous-alimenté n'entraîne pas le vilebrequin assez vite pour générer la compression nécessaire à l'allumage.",
 confirm:"Mesurer la tension de la batterie de chauffe-bougie au repos et en charge ; une chute significative sous la tension nominale confirme une batterie faible. Un banc de démarrage neuf ou rechargé résout immédiatement le problème.",
 exclude:"Une batterie mesurée à pleine charge avec une tension stable en charge exclut cette cause.",

 setting:"Garder systématiquement une batterie de chauffe-bougie de secours chargée en boîte de course, en particulier lors de longues journées de compétition.",
 errors:"Négliger l'entretien des contacts électriques du chauffe-bougie, souvent responsables d'une chute de tension apparente alors que la batterie elle-même est saine.",
 tips:"Un filament de bougie qui rougit faiblement ou pas du tout au chauffe-bougie est un signe immédiat de batterie insuffisamment chargée.",

 confirm:"Le lanceur ou le banc de démarrage transmet un à-coup ou un rebond violent et irrégulier lors des tentatives de démarrage infructueuses, sans lien avec le réglage carburateur.",

/* ===================================================================
   MOTEUR D'INFERENCE
   Système de pondération contextuel simplifié inspiré des réseaux
   bayésiens naïfs : chaque réponse ajuste un score cumulatif par
   cause, normalisé sur la fraction de preuve effectivement recueillie
   pour cette cause précise.
=================================================================== */
const ANSWER_TYPES = [
  {id:"oui", label:"Oui", sub:"Confirmé"},
  {id:"non", label:"Non", sub:"Infirmé"},
  {id:"parfois", label:"Parfois", sub:"Intermittent"},
  {id:"nsp", label:"Je ne sais pas", sub:"Non vérifié"},
  {id:"chaud", label:"Seulement à chaud", sub:"Thermo-dépendant"},
  {id:"froid", label:"Seulement à froid", sub:"Thermo-dépendant"}
];

class InferenceEngine{
  constructor(causes, symptoms){
    this.causes = causes;
    this.symptomsById = Object.fromEntries(symptoms.map(s=>[s[0],{id:s[0],label:s[1],cat:s[2]}]));
    this.answers = {}; // symptomId -> answerId
  }
  reset(){ this.answers = {}; }
  setAnswer(symptomId, answerId){ this.answers[symptomId] = answerId; }
  hasAnswer(symptomId){ return Object.prototype.hasOwnProperty.call(this.answers, symptomId); }
  answeredCount(){ return Object.keys(this.answers).length; }

  // Facteur multiplicatif appliqué au poids d'un symptôme pour une cause donnée
  factorFor(cause, answerId){
    switch(answerId){
      case "oui": return 1.0;
      case "non": return -0.55;
      case "parfois": return 0.35;
      case "nsp": return 0;
      case "chaud":
        if(cause.thermal === "chaud") return 1.0;
        if(cause.thermal === "froid") return -0.4;
        return 0.45;
      case "froid":
        if(cause.thermal === "froid") return 1.0;
        if(cause.thermal === "chaud") return -0.4;
        return 0.45;
      default: return 0;
    }
  }

  // Calcule le score détaillé de chaque cause selon les réponses actuelles
  scoreAll(){
    return this.causes.map(cause=>{
      let raw = 0, maxAnswered = 0, matched = 0;
      for(const [sid, w] of cause.symptoms){
        if(this.hasAnswer(sid)){
          const ans = this.answers[sid];
          const f = this.factorFor(cause, ans);
          raw += w * f;
          maxAnswered += w;
          if(f > 0) matched++;
        }
      }
      let pct;
      if(maxAnswered <= 0){
        pct = null; // aucune preuve recueillie pour cette cause
      } else {
        pct = Math.round((raw / maxAnswered) * 100);
        pct = Math.max(1, Math.min(99, pct));
      }
      return {cause, raw, maxAnswered, pct, matched, totalLinked: cause.symptoms.length};
    });
  }

  // Classement trié, causes sans preuve reléguées en fin
  ranked(){
    const all = this.scoreAll();
    return all.sort((a,b)=>{
      const pa = a.pct===null? -1: a.pct;
      const pb = b.pct===null? -1: b.pct;
      return pb - pa;
    });
  }

  // Sélectionne la meilleure prochaine question (maximise l'impact sur les causes actuellement en tête)
  nextQuestion(excludeIds){
    excludeIds = excludeIds || new Set();
    const ranked = this.ranked().filter(r=>r.pct!==null).slice(0,8);
    const leaders = ranked.length? ranked : this.scoreAll();
    const impact = {};
    for(const r of leaders){
      const weight = (r.pct===null? 10 : r.pct+5);
      for(const [sid, w] of r.cause.symptoms){
        if(this.hasAnswer(sid) || excludeIds.has(sid)) continue;
        impact[sid] = (impact[sid]||0) + w*weight;
      }
    }
    // fallback : si aucun impact calculé (tout début), prendre le symptôme le plus référencé globalement
    let candidates = Object.keys(impact);
    if(candidates.length===0){
      const freq = {};
      for(const c of this.causes){
        for(const [sid,w] of c.symptoms){
          if(this.hasAnswer(sid) || excludeIds.has(sid)) continue;
          freq[sid] = (freq[sid]||0)+w;
        }
      }
      candidates = Object.keys(freq);
      if(candidates.length===0) return null;
      candidates.sort((a,b)=>freq[b]-freq[a]);
      return this.symptomsById[candidates[0]];
    }
    candidates.sort((a,b)=>impact[b]-impact[a]);
    return this.symptomsById[candidates[0]];
  }

  topCause(){
    const r = this.ranked();
    return r.length? r[0] : null;
  }

  isConclusive(){
    const r = this.ranked().filter(x=>x.pct!==null);
    if(!r.length) return false;
    return r[0].pct >= 72 && this.answeredCount() >= 5;
  }
}

const Store = {
  KEY: "moteur_bible_v1",
  load(){
    try{
      const raw = localStorage.getItem(this.KEY);
      if(!raw) return this.defaults();
      const parsed = JSON.parse(raw);
      return Object.assign(this.defaults(), parsed);
    }catch(e){ return this.defaults(); }
  },
  defaults(){
    return { history:[], favorites:[], notes:{}, settingsSaved:[], expertMode:false, undoStack:[], redoStack:[] };
  },
  save(data){
    try{ localStorage.setItem(this.KEY, JSON.stringify(data)); }catch(e){ /* stockage plein ou indisponible */ }
  }
};

  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      if(parsed && parsed.db){
        DB = Object.assign(Store.defaults(), parsed.db);
        persist();
        toast("Import réussi");
        renderShell(); renderView();
      } else { toast("Fichier invalide"); }
    }catch(err){ toast("Erreur de lecture du fichier"); }
  };
  reader.readAsText(file);
}

/* Animation ambiante discrète : particules de flamme dans le canvas du hero */
let flameParticles = [];
function drawFlame(){
  const canvas = document.getElementById("flameCanvas");
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  flameParticles = Array.from({length:26}, ()=>({
    x: 160 + (Math.random()-0.5)*60,
    y: 300 + Math.random()*40,
    r: 2 + Math.random()*4,
    speed: 0.4 + Math.random()*0.9,
    drift: (Math.random()-0.5)*0.6,
    life: Math.random()
  }));
  function tick(){
    if(!document.getElementById("flameCanvas")) return; // vue changée
    ctx.clearRect(0,0,320,320);
    for(const p of flameParticles){
      p.y -= p.speed; p.x += p.drift; p.life += 0.01;
      if(p.y < 40){ p.y = 300 + Math.random()*40; p.x = 160 + (Math.random()-0.5)*60; p.life=0; }
      const alpha = Math.max(0, 0.5 - (300-p.y)/500);
      const hue = p.y < 150 ? "61,217,196" : "255,122,61";
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${hue},${alpha.toFixed(2)})`;
      ctx.fill();
    }
    requestAnimationFrame(tick);
  }
  tick();
}

/* ===================================================================
   VUE — RECHERCHE
=================================================================== */
function levenshtein(a,b){
  a=a.toLowerCase(); b=b.toLowerCase();
  const m=a.length, n=b.length;
  const dp = Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++){
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  }
  return dp[m][n];
}
function fuzzyIncludes(haystack, needle){
  haystack = haystack.toLowerCase(); needle = needle.toLowerCase();
  if(needle.length===0) return true;
  if(haystack.includes(needle)) return true;
  // tolérance aux fautes : fenêtre glissante sur mots
  const words = haystack.split(/\s+/);
  for(const w of words){
    if(Math.abs(w.length-needle.length) <= 2 && levenshtein(w, needle) <= Math.max(1, Math.floor(needle.length*0.3))) return true;
  }
  return false;
}
function highlight(text, q){
  if(!q) return escapeHtml(text);
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if(idx===-1) return escapeHtml(text);
  return escapeHtml(text.slice(0,idx)) + "<mark>" + escapeHtml(text.slice(idx,idx+q.length)) + "</mark>" + escapeHtml(text.slice(idx+q.length));
}

    <div class="search-box" style="margin-top:20px;">

function runSearch(q){
  const results = document.getElementById("search-results");
  if(!q || q.trim().length<2){
    results.innerHTML = `<div class="empty-state"><div class="ico">⌕</div><p>Tapez au moins deux caractères pour lancer la recherche.</p></div>`;
    return;
  }
  const causeHits = CAUSES.filter(c=>fuzzyIncludes(c.name,q)||fuzzyIncludes(c.desc,q)||fuzzyIncludes(c.cat,q));
  const symptomHits = SYMPTOMS.filter(s=>fuzzyIncludes(s[1],q));
  if(causeHits.length===0 && symptomHits.length===0){
    results.innerHTML = `<div class="empty-state"><div class="ico">∅</div><p>Aucun résultat pour « ${escapeHtml(q)} ». Essayez un terme plus général.</p></div>`;
    return;
  }
  let html = "";
  if(causeHits.length){
    html += `<div class="section-head" style="margin-top:6px;"><h2>Causes</h2><span class="count">${causeHits.length}</span></div>`;
    html += causeHits.map(c=>`<div class="card sr-item" data-open="${c.id}"><div><div class="sr-name">${highlight(c.name,q)}</div><div class="sr-cat">${escapeHtml(c.cat)}</div></div><span class="badge-risk risk-${c.risk}">${c.risk===3?'ÉLEVÉ':c.risk===2?'MODÉRÉ':'FAIBLE'}</span></div>`).join("");
  }
  if(symptomHits.length){
    html += `<div class="section-head"><h2>Symptômes associés</h2><span class="count">${symptomHits.length}</span></div>`;
    html += symptomHits.slice(0,20).map(s=>{
      const relatedCauses = CAUSES.filter(c=>c.symptoms.some(x=>x[0]===s[0])).slice(0,3);
      return `<div class="card sr-item"><div><div class="sr-name">${highlight(s[1],q)}</div><div class="sr-cat">${escapeHtml(s[2])} · lié à ${relatedCauses.length} cause(s)</div></div></div>`;
    }).join("");
  }
  results.innerHTML = html;
  results.querySelectorAll("[data-open]").forEach(c=>c.addEventListener("click", ()=>navigate("fiche",{id:c.dataset.open})));
}

/* ===================================================================
   VUE — ASSISTANT DE REGLAGE
=================================================================== */
function computeSettingAdvice(input){
  let hDelta = 0, lDelta = 0, plugAdvice = "Indice médium (référence de base)";
  const notes = [];

  const alt = Number(input.altitude)||0;
  if(alt >= 2500){ hDelta += 0.30; notes.push("Altitude très élevée : correction haut-régime importante nécessaire."); }
  else if(alt >= 1500){ hDelta += 0.22; notes.push("Altitude élevée : enrichir sensiblement le haut-régime."); }
  else if(alt >= 800){ hDelta += 0.14; notes.push("Altitude modérée : légère correction haut-régime."); }
  else if(alt >= 300){ hDelta += 0.06; }

  const temp = Number(input.temperature);
  if(!Number.isNaN(temp)){
    if(temp >= 30){ hDelta += 0.14; plugAdvice = "Indice plus froid recommandé"; notes.push("Forte chaleur : enrichir le haut-régime et surveiller la température culasse."); }
    else if(temp >= 22){ /* neutre */ }
    else if(temp <= 10){ lDelta += 0.10; plugAdvice = "Indice plus chaud recommandé (démarrage)"; notes.push("Temps froid : enrichir légèrement le bas-régime pour fiabiliser le démarrage."); }
    else if(temp <=16){ lDelta += 0.05; }
  }

  const hum = input.humidite;
  if(hum === "eleve"){ hDelta += 0.05; lDelta += 0.03; notes.push("Humidité élevée : légère correction complémentaire, surtout combinée à la chaleur."); }

  const nitro = Number(input.nitro)||16;
  if(nitro >= 25){ notes.push("Fort pourcentage de nitrométhane : privilégier un indice de bougie plus froid et garder une marge de sécurité en haut-régime."); if(plugAdvice.indexOf("froid")===-1) plugAdvice = "Indice plus froid recommandé (fort nitro)"; }
  else if(nitro <= 12){ notes.push("Faible pourcentage de nitrométhane : le démarrage peut être plus exigeant, un indice de bougie plus chaud aide."); }

  const grip = input.grip;
  if(grip === "faible"){ notes.push("Grip faible : privilégier une réponse bas-régime progressive plutôt qu'agressive pour limiter le patinage en sortie de virage."); }
  if(grip === "eleve"){ notes.push("Grip élevé : une réponse bas-régime franche est exploitable sans risque de patinage excessif."); }

  const style = input.style;
  if(style === "agressif"){ hDelta += 0.03; notes.push("Style de pilotage agressif : garder une marge de sécurité thermique légèrement supérieure en haut-régime."); }

  const round8 = v => Math.round(v*8)/8;
  return {
    hDelta: round8(hDelta),
    lDelta: round8(lDelta),
    plugAdvice,
    notes
  };
}

    </div>

    <div class="section-head"><h2>Assistant météo du jour</h2></div>

          <select id="meteo-select">

            <option value="chaud_humide">Chaud et humide</option>
            <option value="froid_sec">Froid et sec</option>

      </div>
    </div>
  `;

  document.getElementById("alt-input").addEventListener("input", e=>{
    const alt = Number(e.target.value)||0;
    const correction = Math.round((alt/500)*0.06*8)/8;
    document.getElementById("alt-output").textContent = alt>0 ? `+${correction} tour vis H (indicatif)` : "—";
  });
  document.getElementById("temp-input").addEventListener("input", e=>{
    const t = Number(e.target.value);
    const out = document.getElementById("temp-output");
    if(Number.isNaN(t) || e.target.value===""){ out.textContent="—"; out.style.color="var(--text)"; return; }
    if(t < 90){ out.textContent="Froid — vérifier richesse"; out.style.color="var(--teal)"; }
    else if(t < 120){ out.textContent="Zone de fonctionnement normale"; out.style.color="var(--ok)"; }
    else if(t < 135){ out.textContent="Élevée — enrichir par précaution"; out.style.color="var(--warn)"; }
    else { out.textContent="CRITIQUE — enrichir immédiatement"; out.style.color="var(--danger)"; }
  });
  document.getElementById("plug-select").addEventListener("change", e=>{
    const map = {ete:"Indice froid (5-8) — sécurité thermique prioritaire", standard:"Indice médium (4) — référence polyvalente", hiver:"Indice chaud (1-3) — fiabilise l'amorçage"};
    document.getElementById("plug-output").textContent = map[e.target.value];
  });
  document.getElementById("plug-select").dispatchEvent(new Event("change"));
  function updateAuto(){
    const cap = Number(document.getElementById("auto-cap").value)||0;
    const conso = Number(document.getElementById("auto-conso").value)||0;
    const out = document.getElementById("auto-output");
    if(cap>0 && conso>0){ out.textContent = (cap/conso).toFixed(1)+" min estimées"; } else out.textContent="—";
  }
  document.getElementById("auto-cap").addEventListener("input", updateAuto);
  document.getElementById("auto-conso").addEventListener("input", updateAuto);
  document.getElementById("fuel-select").addEventListener("change", e=>{
    const map = {loisir:"10-16% nitrométhane, ratio d'huile confortable", club:"16% nitrométhane, base la plus répandue", national:"20-25% nitrométhane, bougie froide requise", elite:"25-30%+ selon règlement, réglage expert requis"};
    document.getElementById("fuel-output").textContent = map[e.target.value];
  });
  document.getElementById("fuel-select").dispatchEvent(new Event("change"));
  document.getElementById("meteo-select").addEventListener("change", e=>{
    const map = {
      chaud_sec:"Enrichir vis H, bougie plus froide, surveiller température activement.",
      chaud_humide:"Enrichir vis H un peu plus qu'en chaud sec, veiller à la ventilation de carrosserie.",
      froid_sec:"Enrichir légèrement vis L, bougie plus chaude, prévoir un préchauffage.",
      froid_humide:"Enrichir L et H légèrement, anticiper un démarrage plus difficile.",
      orage:"Comportement proche de l'altitude : enrichir H par anticipation avant la chute de pression."
    };
    document.getElementById("meteo-output").textContent = map[e.target.value];
  });
  document.getElementById("meteo-select").dispatchEvent(new Event("change"));
}

function renderGuide(view){
  if(state.params && state.params.axis){
    currentGuideAxis = state.params.axis;
    if(typeof state.params.index === "number"){
      openGuideScenarios.add(currentGuideAxis+"-"+state.params.index);
    }
  }
  const axis = TUNING_GUIDE[currentGuideAxis];
  view.innerHTML = `
    <div class="eyebrow">Méthode de préparateur</div>
    <h1 class="page-title">Guide de réglage moteur</h1>
    <p class="page-sub">Retrouvez votre cas de figure exact par la sonorité, la fumée et la stabilité du moteur. Chaque scénario donne le raisonnement mécanique complet, la correction à appliquer et l'astuce de compétition associée.</p>

    <div class="card guide-method">
      <h4 style="font-family:var(--font-mono); font-size:11px; color:var(--flame); text-transform:uppercase; letter-spacing:.07em; margin-bottom:4px;">Ordre de réglage impératif</h4>
      <ol>
        <li><b>1. Ralenti</b> — établir un régime stable avec une marge de sécurité, avant tout autre réglage.</li>
        <li><b>2. Richesse bas-régime (vis L)</b> — valider la reprise au squeeze test depuis ce ralenti stable.</li>
        <li><b>3. Richesse haut-régime (vis H)</b> — rechercher le quatre temps de sécurité à pleine charge, jamais l'inverse.</li>
        <li><b>4. Contre-reprise</b> — n'ajuster ce comportement qu'une fois les trois réglages précédents validés indépendamment.</li>
      </ol>
      <p style="font-size:12.5px; color:var(--text-faint); margin-top:10px; font-family:var(--font-mono);">Ne jamais sauter une étape : un réglage haut-régime ne peut pas compenser un ralenti ou une reprise mal réglés, il ne fera que masquer le symptôme ailleurs.</p>
    </div>

    <div class="guide-axis-tabs">
      ${GUIDE_AXES_ORDER.map((k,i)=>`<button class="axis-tab ${currentGuideAxis===k?'active':''}" data-axis="${k}"><span class="axis-n">${i+1}</span>${TUNING_GUIDE[k].title}</button>`).join("")}
    </div>

    <div class="section-head" style="margin-top:0;"><h2>${escapeHtml(axis.title)} — ${escapeHtml(axis.subtitle)}</h2><span class="count">${axis.scenarios.length} cas de figure</span></div>
    <p class="axis-intro">${escapeHtml(axis.intro)}</p>

    <div id="guide-scenarios">
      ${axis.scenarios.map((s,i)=>{
        const key = currentGuideAxis+"-"+i;
        const open = openGuideScenarios.has(key);
        return `
        <div class="card guide-scenario ${open?'open':''}" data-key="${key}">
          <div class="guide-q-row">
            <div class="guide-q-left">
              <span class="guide-q-num">Q${i+1}</span>
              <span class="guide-q-text">${escapeHtml(s.q)}</span>
            </div>
            <span class="guide-chevron">▸</span>
          </div>
          <div class="guide-body">
            <div class="guide-body-inner">
              <div class="guide-signals">
                <span class="signal-chip snd"><span class="signal-k">SON</span> ${escapeHtml(s.sound)}</span>
                <span class="signal-chip smk"><span class="signal-k">FUMÉE</span> ${escapeHtml(s.smoke)}</span>
                <span class="signal-chip stb"><span class="signal-k">STABILITÉ</span> ${escapeHtml(s.stability)}</span>
              </div>
              <div class="guide-sub"><h5>Raisonnement mécanique</h5><p>${escapeHtml(s.mechanical)}</p></div>
              <div class="guide-sub"><h5>Correction à appliquer</h5><p>${escapeHtml(s.fix)}</p></div>
              <div class="guide-tip"><b>Astuce de compétition</b><p>${escapeHtml(s.tip)}</p></div>
            </div>
          </div>
        </div>`;
      }).join("")}
    </div>
  `;
  view.querySelectorAll("[data-axis]").forEach(b=>b.addEventListener("click", ()=>{ currentGuideAxis=b.dataset.axis; renderView(); }));
  view.querySelectorAll(".guide-scenario").forEach(el=>el.addEventListener("click", (e)=>{
    const key = el.dataset.key;
    if(openGuideScenarios.has(key)) openGuideScenarios.delete(key); else openGuideScenarios.add(key);
    el.classList.toggle("open");
  }));
  if(state.params && typeof state.params.index === "number"){
    const target = view.querySelector(`[data-key="${currentGuideAxis}-${state.params.index}"]`);
    if(target) setTimeout(()=>target.scrollIntoView({behavior:"smooth", block:"start"}), 60);
    state.params = {};
  }
}

/* ===================================================================
   ANALYSE SONORE — TRAITEMENT DU SIGNAL
   Détection de fréquence par autocorrélation temporelle (algorithme
   ACF2+, méthode standard des accordeurs de guitare, adaptée ici à
   la plage de fréquences d'un moteur 2 temps monocylindre : un cycle
   de combustion par tour, donc régime (tr/min) = fréquence (Hz) x 60.
   Limites assumées et affichées à l'utilisateur : mesure indicative,
   sensible au bruit ambiant et à la distance du micro.
=================================================================== */
function computeRMS(buf){
  let sum = 0;
  for(let i=0;i<buf.length;i++) sum += buf[i]*buf[i];
  return Math.sqrt(sum/buf.length);
}

function autoCorrelate(buf, sampleRate){
  let SIZE = buf.length;
  let rms = 0;
  for(let i=0;i<SIZE;i++) rms += buf[i]*buf[i];
  rms = Math.sqrt(rms/SIZE);
  if(rms < 0.008) return -1; // signal trop faible / silence

  // recadrage sur la zone utile du buffer (élimine les bords proches de zéro)
  let r1=0, r2=SIZE-1;
  const thres=0.2;
  for(let i=0;i<SIZE/2;i++){ if(Math.abs(buf[i])<thres){ r1=i; break; } }
  for(let i=1;i<SIZE/2;i++){ if(Math.abs(buf[SIZE-i])<thres){ r2=SIZE-i; break; } }
  let trimmed = buf.slice(r1,r2);
  let SZ = trimmed.length;
  if(SZ < 64) return -1;
  if(SZ > 2600){ trimmed = trimmed.slice(0,2600); SZ = 2600; } // borne le coût de calcul (mobile)

  const c = new Float32Array(SZ);
  for(let i=0;i<SZ;i++){
    let sum=0;
    for(let j=0;j<SZ-i;j++) sum += trimmed[j]*trimmed[j+i];
    c[i]=sum;
  }
  let d=0; while(d<SZ-1 && c[d]>c[d+1]) d++;
  let maxval=-1, maxpos=-1;
  for(let i=d;i<SZ;i++){ if(c[i]>maxval){ maxval=c[i]; maxpos=i; } }
  let T0 = maxpos;
  if(T0<=0) return -1;
  if(T0>0 && T0<SZ-1){
    const x1=c[T0-1], x2=c[T0], x3=c[T0+1];
    const a=(x1+x3-2*x2)/2, b=(x3-x1)/2;
    if(a) T0 = T0 - b/(2*a);
  }
  const freq = sampleRate/T0;
  // plage plausible pour un moteur nitro 3.5cc : ~480 à 42000 tr/min (8 à 700 Hz)
  if(freq < 8 || freq > 700 || !isFinite(freq)) return -1;
  return freq;
}

class SoundAnalyzer{
  constructor(){
    this.audioCtx=null; this.analyser=null; this.stream=null; this.buffer=null;
    this.running=false; this.intervalId=null; this.onSample=null;
  }
  async start(onSample){
    this.stream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false, noiseSuppression:false, autoGainControl:false}});
    const Ctx = window.AudioContext || window.webkitAudioContext;
    this.audioCtx = new Ctx();
    const source = this.audioCtx.createMediaStreamSource(this.stream);
    this.analyser = this.audioCtx.createAnalyser();
    this.analyser.fftSize = 4096;
    source.connect(this.analyser);
    this.buffer = new Float32Array(this.analyser.fftSize);
    this.onSample = onSample;
    this.running = true;
    this.intervalId = setInterval(()=>this.tick(), 100);
  }
  tick(){
    if(!this.running || !this.analyser) return;
    this.analyser.getFloatTimeDomainData(this.buffer);
    const freq = autoCorrelate(this.buffer, this.audioCtx.sampleRate);
    const rpm = freq>0 ? Math.round(freq*60) : null;
    const rms = computeRMS(this.buffer);
    if(this.onSample) this.onSample({t:performance.now(), rpm, rms, freq, waveform:this.buffer.slice(0,512)});
  }
  stop(){
    this.running=false;
    if(this.intervalId) clearInterval(this.intervalId);
    if(this.stream) this.stream.getTracks().forEach(t=>t.stop());
    if(this.audioCtx && this.audioCtx.state!=="closed") this.audioCtx.close().catch(()=>{});
    this.analyser=null;
  }
}
