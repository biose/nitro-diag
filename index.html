  {id:"return", label:"Retour final", type:"hold", duration:6,
   instruction:"RELÂCHEZ COMPLÈTEMENT LES GAZ"},
];

const soundState = {
  running:false, finished:false, analyzer:null, samples:[],
  phaseIndex:-1, phaseEndsAt:0, timerId:null, liveHistory:[], error:null, report:null, countdownIntervalId:null,
};

function isSecureAudioContext(){
  return location.protocol==="https:" || location.hostname==="localhost" || location.hostname==="127.0.0.1";
}

function resetSoundState(){
  soundState.running=false; soundState.finished=false;
  if(soundState.analyzer){ soundState.analyzer.stop(); soundState.analyzer=null; }
  if(soundState.timerId){ clearTimeout(soundState.timerId); soundState.timerId=null; }
  stopCountdownTicker();
  soundState.samples=[]; soundState.phaseIndex=-1; soundState.liveHistory=[]; soundState.error=null; soundState.report=null;
}

async function startSoundProtocol(){
  soundState.error=null;
  if(!isSecureAudioContext()){
    soundState.error="insecure";
    renderView();
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    soundState.error="unsupported";
    renderView();
    return;
  }
  try{
    soundState.analyzer = new SoundAnalyzer();
    await soundState.analyzer.start(onSoundSample);
  }catch(err){
    soundState.error = "permission";
    renderView();
    return;
  }
  soundState.running=true;
  soundState.finished=false;
  soundState.samples=[];
  soundState.phaseIndex=0;
  renderView();
  runPhase();
}

function runPhase(){
  if(soundState.phaseIndex >= SOUND_PROTOCOL.length){
    finishSoundProtocol();
    return;
  }
  const phase = SOUND_PROTOCOL[soundState.phaseIndex];
  soundState.phaseEndsAt = performance.now() + phase.duration*1000;
  updatePhaseUI();
  soundState.timerId = setTimeout(()=>{
    soundState.phaseIndex++;
    runPhase();
  }, phase.duration*1000);
}

function onSoundSample(sample){
  if(!soundState.running || soundState.phaseIndex<0 || soundState.phaseIndex>=SOUND_PROTOCOL.length) return;
  const phase = SOUND_PROTOCOL[soundState.phaseIndex];
  soundState.samples.push({phase:phase.id, t:sample.t, rpm:sample.rpm, rms:sample.rms});
  soundState.liveHistory.push({t:sample.t, rpm:sample.rpm});
  if(soundState.liveHistory.length>150) soundState.liveHistory.shift();
  updateLiveReadout(sample);
  drawSoundCanvas();
}

function updatePhaseUI(){
  // re-rendu complet uniquement au changement de phase (pas à chaque échantillon)
  if(state.route==="sonore") renderView();
}
function startCountdownTicker(){
  stopCountdownTicker();
  soundState.countdownIntervalId = setInterval(()=>{
    const el = document.getElementById("phase-countdown");
    if(el && soundState.running){
      const remaining = Math.max(0, Math.ceil((soundState.phaseEndsAt - performance.now())/1000));
      el.textContent = remaining+"s";
    }
  }, 200);
}
function stopCountdownTicker(){
  if(soundState.countdownIntervalId){ clearInterval(soundState.countdownIntervalId); soundState.countdownIntervalId=null; }
}
function updateLiveReadout(sample){
  const rpmEl = document.getElementById("live-rpm");
  const rmsEl = document.getElementById("live-rms");
  if(rpmEl) rpmEl.textContent = sample.rpm ? sample.rpm : "—";
  if(rmsEl) rmsEl.textContent = sample.rms!=null ? sample.rms.toFixed(3) : "—";
}
function drawSoundCanvas(){
  const canvas = document.getElementById("soundCanvas");
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  const w = canvas.width = canvas.clientWidth * (window.devicePixelRatio||1);
  const h = canvas.height = 120 * (window.devicePixelRatio||1);
  ctx.clearRect(0,0,w,h);
  const hist = soundState.liveHistory.filter(p=>p.rpm);
  if(hist.length<2) return;
  const maxR = Math.max(...hist.map(p=>p.rpm), 4000);
  const minR = Math.min(...hist.map(p=>p.rpm), 1500);
  const span = Math.max(500, maxR-minR);
  ctx.beginPath();
  hist.forEach((p,i)=>{
    const x = (i/(hist.length-1))*w;
    const y = h - ((p.rpm-minR)/span)*h*0.85 - h*0.05;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.strokeStyle = "#3DD9C4";
  ctx.lineWidth = 2*(window.devicePixelRatio||1);
  ctx.stroke();
}

function finishSoundProtocol(){
  if(soundState.analyzer) soundState.analyzer.stop();
  stopCountdownTicker();
  soundState.running=false;
  soundState.finished=true;
  soundState.report = computeSoundReport(soundState.samples);
  DB.history.unshift({date:new Date().toISOString(), causeId:null, causeName:"Analyse sonore — protocole complet", pct:null, answers:soundState.samples.length, isSoundSession:true});
  DB.history = DB.history.slice(0,50);
  persist();
  renderView();
}

function stopSoundProtocol(){
  resetSoundState();
  renderView();
}

/* ===================================================================
   ANALYSE — traduction des mesures brutes en constats de reglage
=================================================================== */
function phaseStats(samples, phaseId){
  const rpms = samples.filter(s=>s.phase===phaseId && s.rpm).map(s=>s.rpm);
  if(rpms.length<2) return null;
  const mean = rpms.reduce((a,b)=>a+b,0)/rpms.length;
  const variance = rpms.reduce((a,b)=>a+(b-mean)**2,0)/rpms.length;
  const std = Math.sqrt(variance);
  return {mean, std, cv: mean>0?std/mean:0, n:rpms.length, min:Math.min(...rpms), max:Math.max(...rpms), rpms};
}

function jerkRatioOf(rpms){
  if(rpms.length<4) return 0;
  let breaks=0;
  for(let i=2;i<rpms.length;i++){
    const d1=rpms[i-1]-rpms[i-2], d2=rpms[i]-rpms[i-1];
    if(Math.sign(d1)!==Math.sign(d2) && d1!==0 && d2!==0) breaks++;
  }
  return breaks/rpms.length;
}

function fourStrokeIndex(stats){
  if(!stats || stats.rpms.length<4) return {ratio:0, detected:false};
  const sorted = [...stats.rpms].sort((a,b)=>a-b);
  const median = sorted[Math.floor(sorted.length/2)];
  let halfDips=0;
  for(const r of stats.rpms){ if(r < median*0.68 && r > median*0.32) halfDips++; }
  const ratio = halfDips/stats.rpms.length;
  return {ratio, detected: ratio>0.15, median};
}

function analyzeSqueeze(samples, idleMean){
  const rpms = samples.filter(s=>s.phase==="squeeze" && s.rpm).map(s=>s.rpm);
  if(rpms.length<3 || !idleMean) return {status:"insuffisant"};
  const peak = Math.max(...rpms);
  const afterFirstThird = rpms.slice(Math.max(1,Math.floor(rpms.length/3)));
  const dip = afterFirstThird.length? Math.min(...afterFirstThird) : peak;
  const riseRatio = peak>idleMean ? (peak-idleMean)/idleMean : 0;
  const jerkRatio = jerkRatioOf(rpms);
  if(dip < idleMean*1.18 && peak > idleMean*1.8) return {status:"trou", peak, dip, jerkRatio, riseRatio};
  if(riseRatio < 1.3) return {status:"mollesse", peak, dip, jerkRatio, riseRatio};
  if(jerkRatio > 0.35) return {status:"broutement", peak, dip, jerkRatio, riseRatio};
  return {status:"ok", peak, dip, jerkRatio, riseRatio};
}

function computeSoundReport(samples){
  const idle = phaseStats(samples,"idle");
  const progressive = phaseStats(samples,"progressive");
  const wot = phaseStats(samples,"wot");
  const release = phaseStats(samples,"release");
  const ret = phaseStats(samples,"return");
  const squeeze = analyzeSqueeze(samples, idle? idle.mean : null);

  const findings = [];

  // --- RALENTI ---
  if(idle){
    if(idle.cv > 0.09){
      findings.push({severity:"warn", title:"Ralenti instable (oscillation détectée)", axis:"ralenti", index:0,
        detail:`Coefficient de variation du régime au ralenti : ${(idle.cv*100).toFixed(1)}%. Cette amplitude d'oscillation est cohérente avec un ralenti trop riche.`});
    } else {
      findings.push({severity:"ok", title:"Ralenti stable", axis:null, index:null,
        detail:`Régime moyen ${Math.round(idle.mean)} tr/min, variation ${(idle.cv*100).toFixed(1)}% — dans la plage de stabilité normale.`});
    }
    if(idle.mean > 3600){
      findings.push({severity:"warn", title:"Régime de ralenti élevé", axis:"ralenti", index:1,
        detail:`Régime moyen mesuré ${Math.round(idle.mean)} tr/min, au-dessus de la plage habituelle 2800-3200 tr/min.`});
    }
  } else {
    findings.push({severity:"warn", title:"Ralenti non mesurable", axis:null, index:null,
      detail:"Signal insuffisant pendant la phase ralenti — rapprochez le micro du moteur et refaites le test."});
  }

  // --- REPRISE (squeeze test) ---
  if(squeeze.status==="trou"){
    findings.push({severity:"danger", title:"Trou à l'accélération détecté", axis:"reprise", index:0,
      detail:`Le régime chute à ${Math.round(squeeze.dip)} tr/min juste après le déclenchement avant de remonter à ${Math.round(squeeze.peak)} tr/min — signature typique d'un manque de richesse bas-régime.`});
  } else if(squeeze.status==="mollesse"){
    findings.push({severity:"warn", title:"Reprise molle détectée", axis:"reprise", index:1,
      detail:`Montée en régime limitée (pic à ${Math.round(squeeze.peak)} tr/min pour un ralenti à ${Math.round(idle?idle.mean:0)} tr/min) sans trou franc — cohérent avec un excès de richesse bas-régime.`});
  } else if(squeeze.status==="broutement"){
    findings.push({severity:"warn", title:"Broutement en reprise détecté", axis:"reprise", index:4,
      detail:"Irrégularités répétées et non rythmiques du régime pendant la reprise — à confirmer par une inspection mécanique du circuit bas-régime plutôt qu'un simple réglage."});
  } else if(squeeze.status==="ok"){
    findings.push({severity:"ok", title:"Reprise franche", axis:null, index:null,
      detail:`Montée nette du ralenti (${Math.round(idle?idle.mean:0)} tr/min) au pic (${Math.round(squeeze.peak)} tr/min) sans trou ni mollesse détectés.`});
  }

  // --- MONTEE PROGRESSIVE ---
  if(progressive){
    const jr = jerkRatioOf(progressive.rpms);
    if(jr > 0.3){
      findings.push({severity:"warn", title:"Irrégularités en montée progressive", axis:"reprise", index:2,
        detail:`Indice de saccade ${(jr*100).toFixed(0)}% pendant l'accélération lente (mesuré sur la variation cycle à cycle, indépendamment de la montée en régime attendue) — cohérent avec une hésitation en accélération progressive.`});
    }
  }

  // --- HAUT-REGIME : quatre temps ---
  const wotFS = fourStrokeIndex(wot);
  const releaseFS = fourStrokeIndex(release);
  if(!wotFS.detected && !releaseFS.detected){
    findings.push({severity:"danger", title:"Aucun quatre temps détecté — marge de sécurité absente", axis:"hautregime", index:1,
      detail:"Ni la phase plein gaz ni la phase de relâcher léger ne montrent de signature de quatre temps. C'est le profil le plus à risque de grippage : enrichissez la vis H avant tout nouveau run."});
  } else if(wotFS.detected){
    findings.push({severity:"warn", title:"Quatre temps présent même à pleine charge", axis:"hautregime", index:2,
      detail:`Signature de quatre temps détectée pendant la phase plein gaz stabilisé (indice ${(wotFS.ratio*100).toFixed(0)}%) — cohérent avec un réglage haut-régime trop riche, perte de vitesse de pointe probable.`});
  } else if(releaseFS.detected){
    findings.push({severity:"ok", title:"Marge de sécurité haut-régime cohérente", axis:"hautregime", index:0,
      detail:`Le quatre temps apparaît au relâcher léger (indice ${(releaseFS.ratio*100).toFixed(0)}%) mais pas en pleine charge stabilisée — c'est le profil recherché par la méthode de référence.`});
  }

  // --- RETOUR / CONTRE-REPRISE ---
  if(ret){
    const lastSamples = samples.filter(s=>s.phase==="return");
    const stalled = lastSamples.length>3 && lastSamples.slice(-3).every(s=>!s.rpm || s.rms<0.01);
    if(stalled){
      findings.push({severity:"danger", title:"Calage détecté au retour au ralenti", axis:"contrereprise", index:0,
        detail:"Le signal disparaît en fin de phase de retour au ralenti, cohérent avec un calage en décélération."});
    } else if(idle && ret.mean > idle.mean*1.25){
      findings.push({severity:"warn", title:"Retour au ralenti incomplet", axis:"contrereprise", index:3,
        detail:`Le régime en fin de protocole (${Math.round(ret.mean)} tr/min) reste sensiblement au-dessus du ralenti mesuré en début de test (${Math.round(idle?idle.mean:0)} tr/min).`});
    }
  }

  return {findings, stats:{idle, progressive, wot, release, ret, squeeze, wotFS, releaseFS}};
}

/* ===================================================================
   VUE — ANALYSE SONORE
=================================================================== */
function renderSonore(view){
  if(soundState.running){ renderSonoreLive(view); return; }
  if(soundState.finished && soundState.report){ renderSonoreReport(view); return; }
  renderSonoreIntro(view);
}

function renderSonoreIntro(view){
  view.innerHTML = `
    <div class="eyebrow">Protocole guidé au microphone</div>
    <h1 class="page-title">Analyse sonore du moteur</h1>
    <p class="page-sub">Le système vous dicte chaque geste comme un préparateur en atelier — ralenti, squeeze test, montée progressive, plein gaz, relâcher léger — et analyse le régime moteur en temps réel par autocorrélation du son capté.</p>

    <div class="sound-warning">
      <b>Ce que cette mesure peut vraiment vous dire</b>
      <p><strong>Fiable :</strong> le régime moteur (tr/min), la stabilité du ralenti, la présence ou l'absence de quatre temps.<br>
      <strong>Indicatif seulement :</strong> l'estimation précise de la richesse. Le micro d'un smartphone est sensible au bruit ambiant, au vent et à la distance — traitez chaque verdict comme un indice à confirmer, pas comme une mesure de laboratoire.</p>
    </div>
    ${soundState.error==="insecure" ? `<div class="sound-error"><b>Microphone indisponible</b><p>L'accès au micro nécessite une connexion sécurisée (https) ou une exécution en local (localhost). Ouvrir ce fichier directement (file://) bloque généralement l'accès au micro sur Chrome Android. Hébergez ce fichier (serveur local, GitHub Pages, etc.) ou utilisez « Ajouter à l'écran d'accueil » depuis une page servie en https.</p></div>` : ""}
    ${soundState.error==="unsupported" ? `<div class="sound-error"><b>Navigateur non compatible</b><p>Votre navigateur ne supporte pas l'accès au microphone via l'API Web Audio. Utilisez une version récente de Chrome sur Android.</p></div>` : ""}
    ${soundState.error==="permission" ? `<div class="sound-error"><b>Permission micro refusée</b><p>Vous devez autoriser l'accès au microphone pour utiliser ce protocole. Vérifiez les autorisations du site dans les paramètres du navigateur puis réessayez.</p></div>` : ""}

    <div class="card rec-start-zone">
      <button class="rec-btn" id="btn-start-rec">● REC</button>
      <p class="rec-hint">Le protocole complet dure environ 45 secondes. Assurez-vous que le moteur tourne déjà au ralenti avant de démarrer, et que vous pouvez tenir la gâchette pendant tout le test.</p>
      <div class="protocol-list">
        ${SOUND_PROTOCOL.map((p,i)=>`<div class="protocol-list-item"><span class="pn">${i+1}</span><span class="pl">${escapeHtml(p.label)} — ${p.duration}s</span></div>`).join("")}
      </div>
    </div>
  `;
  document.getElementById("btn-start-rec").addEventListener("click", startSoundProtocol);
}

function renderSonoreLive(view){
  const phase = SOUND_PROTOCOL[soundState.phaseIndex] || SOUND_PROTOCOL[SOUND_PROTOCOL.length-1];
  view.innerHTML = `
    <div class="eyebrow">Protocole en cours</div>
    <h1 class="page-title">Analyse sonore — enregistrement</h1>
    <div class="live-wrap phase-type-${phase.type}">
      <div class="phase-banner">
        <div class="phase-label">Étape ${soundState.phaseIndex+1} / ${SOUND_PROTOCOL.length} · ${escapeHtml(phase.label)}</div>
        <div class="phase-instruction">${escapeHtml(phase.instruction)}</div>
        <div class="phase-countdown" id="phase-countdown">${phase.duration}s</div>
        <div class="phase-progress-dots">
          ${SOUND_PROTOCOL.map((p,i)=>`<span class="phase-dot ${i<soundState.phaseIndex?'done':i===soundState.phaseIndex?'current':''}"></span>`).join("")}
        </div>
      </div>
      <div class="live-readout">
        <div class="readout-box"><b id="live-rpm">—</b><span>tr/min estimé</span></div>
        <div class="readout-box"><b id="live-rms">—</b><span>niveau signal</span></div>
      </div>
      <div class="live-canvas-wrap"><canvas id="soundCanvas"></canvas></div>
      <button class="btn btn-ghost rec-stop-btn" id="btn-stop-rec">Arrêter le protocole</button>
    </div>
  `;
  document.getElementById("btn-stop-rec").addEventListener("click", stopSoundProtocol);
  startCountdownTicker();
  drawSoundCanvas();
}

function renderSonoreReport(view){
  const r = soundState.report;
  const sevIco = {ok:"✓", warn:"!", danger:"⚠"};
  view.innerHTML = `
    <div class="eyebrow">Résultat du protocole</div>
    <h1 class="page-title">Rapport d'analyse sonore</h1>
    <p class="page-sub">${r.findings.length} constat(s) établis à partir de ${soundState.samples.filter(s=>s.rpm).length} mesures de régime exploitables. Résultats indicatifs — croisez-les avec le Guide de réglage.</p>

    <div style="margin:18px 0 26px; display:flex; gap:10px;">
      <button class="btn btn-primary btn-sm" id="btn-restart-sound">Refaire le protocole</button>
      <button class="btn btn-ghost btn-sm" id="btn-goto-guide">Ouvrir le Guide de réglage</button>
    </div>

    ${r.findings.map(f=>`
      <div class="report-verdict ${f.severity}">
        <div class="report-verdict-ico">${sevIco[f.severity]}</div>
        <div style="flex:1;">
          <div class="report-verdict-title">${escapeHtml(f.title)}</div>
          <div class="report-verdict-detail">${escapeHtml(f.detail)}</div>
        </div>
        ${f.axis!=null ? `<button class="btn btn-ghost btn-sm" data-goto-axis="${f.axis}" data-goto-index="${f.index}">Voir dans le guide →</button>` : ""}
      </div>
    `).join("")}

    <div class="section-head"><h2>Mesures brutes</h2><span class="count">pour vérification</span></div>
    <div class="report-metrics">
      ${r.stats.idle ? `<div class="report-metric"><b>${Math.round(r.stats.idle.mean)}</b><span>Ralenti moyen (tr/min)</span></div>` : ""}
      ${r.stats.idle ? `<div class="report-metric"><b>${(r.stats.idle.cv*100).toFixed(1)}%</b><span>Variation ralenti</span></div>` : ""}
      ${r.stats.squeeze && r.stats.squeeze.peak ? `<div class="report-metric"><b>${Math.round(r.stats.squeeze.peak)}</b><span>Pic squeeze test</span></div>` : ""}
      ${r.stats.wot ? `<div class="report-metric"><b>${Math.round(r.stats.wot.mean)}</b><span>Régime plein gaz</span></div>` : ""}
      ${r.stats.wotFS ? `<div class="report-metric"><b>${(r.stats.wotFS.ratio*100).toFixed(0)}%</b><span>Indice 4T plein gaz</span></div>` : ""}
      ${r.stats.releaseFS ? `<div class="report-metric"><b>${(r.stats.releaseFS.ratio*100).toFixed(0)}%</b><span>Indice 4T relâcher</span></div>` : ""}
    </div>
  `;
  document.getElementById("btn-restart-sound").addEventListener("click", ()=>{ resetSoundState(); renderView(); });
  document.getElementById("btn-goto-guide").addEventListener("click", ()=>navigate("guide"));
  view.querySelectorAll("[data-goto-axis]").forEach(b=>b.addEventListener("click", ()=>{
    const axis = b.dataset.gotoAxis;
    const idx = Number(b.dataset.gotoIndex);
    navigate("guide", {axis, index: idx});
  }));
}

/* ===================================================================
   RACCOURCIS CLAVIER
=================================================================== */
document.addEventListener("keydown", (e)=>{
  const tag = (e.target && e.target.tagName) || "";
  if(tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT"){
    if(e.key === "Escape") e.target.blur();
    return;
  }
  if(e.key === "/"){ e.preventDefault(); navigate("recherche"); }
  else if(e.key === "g" || e.key === "G"){ engine.reset(); state.askedOrder=[]; state.currentQuestion=null; navigate("diagnostic"); }
  else if(e.key === "h" || e.key === "H"){ navigate("home"); }
  else if(e.key === "p" || e.key === "P"){ window.print(); }
});

/* ===================================================================
   INITIALISATION
=================================================================== */
render();
</script>
